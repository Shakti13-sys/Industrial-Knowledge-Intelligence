version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-llama-3.3-70b-versatile}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.groq.com/openai/v1}
      - ENVIRONMENT=production
      - ALLOWED_ORIGINS=http://localhost:3000
      - JWT_SECRET=${JWT_SECRET:-please-change-this-to-a-long-random-string}
      - DEMO_USERNAME=${DEMO_USERNAME:-demo}
      - DEMO_PASSWORD=${DEMO_PASSWORD:-ikip-demo}
    volumes:
      - backend_uploads:/app/uploads
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend_uploads:
  backend_data:
